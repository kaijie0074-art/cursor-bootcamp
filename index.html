<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Todo - Cursor Bootcamp</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, "Microsoft YaHei", Arial; max-width: 820px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 24px; margin: 0 0 14px; }
    .card { border: 1px solid #e5e5e5; border-radius: 14px; padding: 16px; box-shadow: 0 2px 10px rgba(0,0,0,.04); }
    .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    input { flex: 1; min-width: 220px; padding: 10px 12px; border: 1px solid #ddd; border-radius: 10px; outline: none; }
    button { padding: 10px 14px; border: 0; border-radius: 10px; cursor: pointer; }
    button.primary { background: #111; color: #fff; }
    button.ghost { background: #f3f3f3; }
    .muted { color:#666; font-size: 12px; }
    .err { color:#b00020; margin-top: 8px; }
    .ok { color:#0b7a2a; margin-top: 8px; }
    hr { border:none; border-top:1px solid #eee; margin: 14px 0; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { display:flex; align-items:center; justify-content:space-between; padding: 10px 8px; border-top: 1px solid #eee; }
    .left { display:flex; align-items:center; gap:10px; }
    .done { text-decoration: line-through; color:#999; }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:10px; }
    .tag { background:#f3f3f3; padding:6px 10px; border-radius: 999px; font-size: 12px; }
    .hide { display:none; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>Todo（登录版）</h1>
    <div class="row">
      <span id="userTag" class="tag hide"></span>
      <button id="logoutBtn" class="ghost hide">退出登录</button>
    </div>
  </div>

  <div class="card">
    <!-- 登录/注册区 -->
    <div id="authBox">
      <div class="row">
        <input id="username" placeholder="用户名（比如：test）" autocomplete="username" />
        <input id="password" placeholder="密码（至少6位）" type="password" autocomplete="current-password" />
      </div>
      <div class="row" style="margin-top:10px;">
        <button id="loginBtn" class="primary">登录</button>
        <button id="registerBtn" class="ghost">注册</button>
        <span class="muted">注册后会自动登录</span>
      </div>
      <div id="authMsg" class="err"></div>
      <hr />
    </div>

    <!-- Todo 区 -->
    <div id="todoBox" class="hide">
      <form id="form" class="row">
        <input id="text" placeholder="输入任务，比如：做商业化产品" />
        <button class="primary" type="submit">添加</button>
      </form>
      <ul id="list"></ul>
      <div class="muted" style="margin-top:10px;">接口：/auth/* + GET/POST/PUT/DELETE /todos（由你的 Node 服务器提供）</div>
      <div id="todoMsg" class="err"></div>
    </div>
  </div>

  <script>
    const authBox = document.getElementById('authBox');
    const todoBox = document.getElementById('todoBox');
    const userTag = document.getElementById('userTag');
    const logoutBtn = document.getElementById('logoutBtn');

    const usernameEl = document.getElementById('username');
    const passwordEl = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const authMsg = document.getElementById('authMsg');

    const formEl = document.getElementById('form');
    const textEl = document.getElementById('text');
    const listEl = document.getElementById('list');
    const todoMsg = document.getElementById('todoMsg');

    async function api(path, options) {
      const res = await fetch(path, { credentials: 'include', ...(options || {}) });
      if (!res.ok) {
        let msg = `请求失败：${res.status}`;
        try {
          const data = await res.json();
          if (data && data.message) msg += ` - ${data.message}`;
        } catch {}
        throw new Error(msg);
      }
      // 可能是 message，也可能是对象/数组
      return res.json().catch(() => ({}));
    }

    function setAuthed(user) {
      if (user) {
        authBox.classList.add('hide');
        todoBox.classList.remove('hide');
        userTag.classList.remove('hide');
        logoutBtn.classList.remove('hide');
        userTag.textContent = `已登录：${user.username}`;
        authMsg.textContent = '';
      } else {
        authBox.classList.remove('hide');
        todoBox.classList.add('hide');
        userTag.classList.add('hide');
        logoutBtn.classList.add('hide');
        userTag.textContent = '';
      }
    }

    function renderTodos(todos) {
      listEl.innerHTML = '';
      todos.forEach(todo => {
        const li = document.createElement('li');

        const left = document.createElement('div');
        left.className = 'left';

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = !!todo.completed;
        checkbox.addEventListener('change', async () => {
          todoMsg.textContent = '';
          await api(`/todos/${todo.id}`, { method: 'PUT' });
          await refreshTodos();
        });

        const text = document.createElement('span');
        text.textContent = todo.text;
        if (todo.completed) text.className = 'done';

        left.appendChild(checkbox);
        left.appendChild(text);

        const del = document.createElement('button');
        del.className = 'ghost';
        del.textContent = '删除';
        del.addEventListener('click', async () => {
          todoMsg.textContent = '';
          await api(`/todos/${todo.id}`, { method: 'DELETE' });
          await refreshTodos();
        });

        li.appendChild(left);
        li.appendChild(del);
        listEl.appendChild(li);
      });
    }

    async function refreshMe() {
      try {
        const me = await api('/auth/me');
        setAuthed(me);
        if (me) await refreshTodos();
      } catch (e) {
        // 如果 /auth/me 失败，直接视为未登录
        setAuthed(null);
      }
    }

    async function refreshTodos() {
      try {
        const todos = await api('/todos');
        renderTodos(todos);
      } catch (e) {
        todoMsg.textContent = e.message;
      }
    }

    loginBtn.addEventListener('click', async () => {
      authMsg.textContent = '';
      try {
        await api('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: usernameEl.value.trim(), password: passwordEl.value })
        });
        await refreshMe();
      } catch (e) {
        authMsg.textContent = e.message;
      }
    });

    registerBtn.addEventListener('click', async () => {
      authMsg.textContent = '';
      try {
        await api('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: usernameEl.value.trim(), password: passwordEl.value })
        });
        await refreshMe();
      } catch (e) {
        authMsg.textContent = e.message;
      }
    });

    logoutBtn.addEventListener('click', async () => {
      try {
        await api('/auth/logout', { method: 'POST' });
      } catch {}
      setAuthed(null);
      listEl.innerHTML = '';
      todoMsg.textContent = '';
    });

    formEl.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = textEl.value.trim();
      if (!text) return;

      todoMsg.textContent = '';
      try {
        await api('/todos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        textEl.value = '';
        await refreshTodos();
      } catch (e) {
        todoMsg.textContent = e.message;
      }
    });

    // 页面加载时检查登录状态
    refreshMe();
  </script>
</body>
</html>
